- id: labor_contract_law_10
  law: 中华人民共和国劳动合同法
  article: 第十条
  content: 建立劳动关系，应当订立书面劳动合同。已建立劳动关系，未同时订立书面劳动合同的，应当自用工之日起一个月内订立书面劳动合同。用人单位与劳动者在用工前订立劳动合同的，劳动关系自用工之日起建立。
  tags: [劳动合同, 签订合同, 书面合同]
  applicable_scenarios: [未签劳动合同]

- id: labor_contract_law_19
  law: 中华人民共和国劳动合同法
  article: 第十九条
  content: |
    劳动合同期限三个月以上不满一年的，试用期不得超过一个月；劳动合同期限一年以上不满三年的，试用期不得超过二个月；三年以上固定期限和无固定期限的劳动合同，试用期不得超过六个月。
    同一用人单位与同一劳动者只能约定一次试用期。以完成一定工作任务为期限的劳动合同或者劳动合同期限不满三个月的，不得约定试用期。试用期包含在劳动合同期限内。劳动合同仅约定试用期的，试用期不成立，该期限为劳动合同期限。
  tags: [试用期, 试用期期限]
  applicable_scenarios: [试用期违法]

- id: labor_contract_law_47
  law: 中华人民共和国劳动合同法
  article: 第四十七条
  content: |
    经济补偿按劳动者在本单位工作的年限，每满一年支付一个月工资的标准向劳动者支付。六个月以上不满一年的，按一年计算；不满六个月的，向劳动者支付半个月工资的经济补偿。
    劳动者月工资高于用人单位所在直辖市、设区的市级人民政府公布的本地区上年度职工月平均工资三倍的，向其支付经济补偿的标准按职工月平均工资三倍的数额支付，向其支付经济补偿的年限最高不超过十二年。
    本条所称月工资是指劳动者在劳动合同解除或者终止前十二个月的平均工资。
  tags: [经济补偿, 解除合同, 终止合同, 工作年限, 月工资]
  applicable_scenarios: [合法解除, 协商解除, 劳动合同期满终止]

- id: labor_contract_law_82
  law: 中华人民共和国劳动合同法
  article: 第八十二条
  content: 用人单位自用工之日起超过一个月不满一年未与劳动者订立书面劳动合同的，应当向劳动者每月支付二倍的工资。用人单位违反本法规定不与劳动者订立无固定期限劳动合同的，自应当订立无固定期限劳动合同之日起向劳动者每月支付二倍的工资。
  tags: [双倍工资, 未签合同, 无固定期限合同]
  applicable_scenarios: [未签劳动合同]

- id: labor_contract_law_87
  law: 中华人民共和国劳动合同法
  article: 第八十七条
  content: 用人单位违反本法规定解除或者终止劳动合同的，应当依照本法第四十七条规定的经济补偿标准的二倍向劳动者支付赔偿金。
  tags: [违法解除, 赔偿金, 2N]
  applicable_scenarios: [违法解除劳动合同]

- id: labor_contract_law_39
  law: 中华人民共和国劳动合同法
  article: 第三十九条
  content: 劳动者有下列情形之一的，用人单位可以解除劳动合同：（一）在试用期间被证明不符合录用条件的；（二）严重违反用人单位的规章制度的；（三）严重失职，营私舞弊，给用人单位造成重大损害的；（四）劳动者同时与其他用人单位建立劳动关系，对完成本单位的工作任务造成严重影响，或者经用人单位提出，拒不改正的；（五）因本法第二十六条第一款第一项规定的情形致使劳动合同无效的；（六）被依法追究刑事责任的。
  tags: [解除合同, 过失性解除, 规章制度, 严重违纪]
  applicable_scenarios: [合法解除, 员工过错解除]

- id: labor_contract_law_40
  law: 中华人民共和国劳动合同法
  article: 第四十条
  content: 有下列情形之一的，用人单位提前三十日以书面形式通知劳动者本人或者额外支付劳动者一个月工资后，可以解除劳动合同：（一）劳动者患病或者非因工负伤，在规定的医疗期满后不能从事原工作，也不能从事由用人单位另行安排的工作的；（二）劳动者不能胜任工作，经过培训或者调整工作岗位，仍不能胜任工作的；（三）劳动合同订立时所依据的客观情况发生重大变化，致使劳动合同无法履行，经用人单位与劳动者协商，未能就变更劳动合同内容达成协议的。
  tags: [解除合同, 无过失性解除, 医疗期满, 不能胜任, 客观情况变化]
  applicable_scenarios: [合法解除, 协商解除]

- id: labor_contract_law_48
  law: 中华人民共和国劳动合同法
  article: 第四十八条
  content: 用人单位违反本法规定解除或者终止劳动合同，劳动者要求继续履行劳动合同的，用人单位应当继续履行；劳动者不要求继续履行劳动合同或者劳动合同已经不能继续履行的，用人单位应当依照本法第八十七条规定支付赔偿金。
  tags: [违法解除, 继续履行, 赔偿金]
  applicable_scenarios: [违法解除劳动合同]
