# 中华人民共和国劳动合同法（2012年修正版）
# 2007年6月29日通过，2012年12月28日修正
# 共8章98条，2025-2026年沿用
# 来源：全国人大网 [WebSearch校验 2026-07-16]

- id: labor_contract_law_10
  law: 中华人民共和国劳动合同法
  article: 第十条
  content: 建立劳动关系，应当订立书面劳动合同。已建立劳动关系，未同时订立书面劳动合同的，应当自用工之日起一个月内订立书面劳动合同。用人单位与劳动者在用工前订立劳动合同的，劳动关系自用工之日起建立。
  tags: [劳动合同, 签订合同, 书面合同, 一个月内]

- id: labor_contract_law_14
  law: 中华人民共和国劳动合同法
  article: 第十四条
  content: 无固定期限劳动合同指用人单位与劳动者约定无确定终止时间的劳动合同。下列情形下劳动者提出或同意续订、订立劳动合同的，除劳动者提出订立固定期限劳动合同外，应当订立无固定期限劳动合同：（一）劳动者在该用人单位连续工作满十年的；（二）用人单位初次实行劳动合同制度或者国有企业改制重新订立劳动合同时，劳动者在该用人单位连续工作满十年且距法定退休年龄不足十年的；（三）连续订立二次固定期限劳动合同，且劳动者没有本法第三十九条和第四十条第一项、第二项规定情形，续订劳动合同的。用人单位自用工之日起满一年不与劳动者订立书面劳动合同的，视为已订立无固定期限劳动合同。
  tags: [无固定期限合同, 连续工作满十年, 二次续订, 满一年未签]

- id: labor_contract_law_19
  law: 中华人民共和国劳动合同法
  article: 第十九条
  content: 劳动合同期限三个月以上不满一年的，试用期不得超过一个月；劳动合同期限一年以上不满三年的，试用期不得超过二个月；三年以上固定期限和无固定期限的劳动合同，试用期不得超过六个月。同一用人单位与同一劳动者只能约定一次试用期。以完成一定工作任务为期限的劳动合同或者劳动合同期限不满三个月的，不得约定试用期。试用期包含在劳动合同期限内。劳动合同仅约定试用期的，试用期不成立，该期限为劳动合同期限。
  tags: [试用期, 试用期期限, 最多六个月, 仅限一次, 不满三个月不得约定]

- id: labor_contract_law_20
  law: 中华人民共和国劳动合同法
  article: 第二十条
  content: 劳动者在试用期的工资不得低于本单位相同岗位最低档工资或者劳动合同约定工资的百分之八十，并不得低于用人单位所在地的最低工资标准。
  tags: [试用期工资, 80%, 最低工资]

- id: labor_contract_law_23
  law: 中华人民共和国劳动合同法
  article: 第二十三条
  content: 用人单位与劳动者可以在劳动合同中约定保守用人单位的商业秘密和与知识产权相关的保密事项。对负有保密义务的劳动者，用人单位可以在劳动合同或者保密协议中与劳动者约定竞业限制条款，并约定在解除或者终止劳动合同后，在竞业限制期限内按月给予劳动者经济补偿。劳动者违反竞业限制约定的，应当按照约定向用人单位支付违约金。
  tags: [竞业限制, 保密协议, 经济补偿, 违约金]

- id: labor_contract_law_24
  law: 中华人民共和国劳动合同法
  article: 第二十四条
  content: 竞业限制的人员限于用人单位的高级管理人员、高级技术人员和其他负有保密义务的人员。竞业限制的范围、地域、期限由用人单位与劳动者约定，竞业限制的约定不得违反法律、法规的规定。在解除或者终止劳动合同后，前款规定的人员到与本单位生产或者经营同类产品、从事同类业务的有竞争关系的其他用人单位，或者自己开业生产或者经营同类产品、从事同类业务的竞业限制期限，不得超过二年。
  tags: [竞业限制, 高管, 高级技术人员, 最长期限二年]

- id: labor_contract_law_38
  law: 中华人民共和国劳动合同法
  article: 第三十八条
  content: 用人单位有下列情形之一的，劳动者可以解除劳动合同：（一）未按照劳动合同约定提供劳动保护或者劳动条件的；（二）未及时足额支付劳动报酬的；（三）未依法为劳动者缴纳社会保险费的；（四）用人单位的规章制度违反法律、法规的规定，损害劳动者权益的；（五）因本法第二十六条第一款规定的情形致使劳动合同无效的；（六）法律、行政法规规定劳动者可以解除劳动合同的其他情形。用人单位以暴力、威胁或者非法限制人身自由的手段强迫劳动者劳动的，或者用人单位违章指挥、强令冒险作业危及劳动者人身安全的，劳动者可以立即解除劳动合同，不需事先告知用人单位。
  tags: [劳动者解除权, 即时解除, 拖欠工资, 未缴社保, 强迫劳动]

- id: labor_contract_law_39
  law: 中华人民共和国劳动合同法
  article: 第三十九条
  content: 劳动者有下列情形之一的，用人单位可以解除劳动合同：（一）在试用期间被证明不符合录用条件的；（二）严重违反用人单位的规章制度的；（三）严重失职，营私舞弊，给用人单位造成重大损害的；（四）劳动者同时与其他用人单位建立劳动关系，对完成本单位的工作任务造成严重影响，或者经用人单位提出，拒不改正的；（五）因本法第二十六条第一款第一项规定的情形致使劳动合同无效的；（六）被依法追究刑事责任的。
  tags: [过失性辞退, 不符合录用条件, 严重违纪, 解除合同]

- id: labor_contract_law_40
  law: 中华人民共和国劳动合同法
  article: 第四十条
  content: 有下列情形之一的，用人单位提前三十日以书面形式通知劳动者本人或者额外支付劳动者一个月工资后，可以解除劳动合同：（一）劳动者患病或者非因工负伤，在规定的医疗期满后不能从事原工作，也不能从事由用人单位另行安排的工作的；（二）劳动者不能胜任工作，经过培训或者调整工作岗位，仍不能胜任工作的；（三）劳动合同订立时所依据的客观情况发生重大变化，致使劳动合同无法履行，经用人单位与劳动者协商，未能就变更劳动合同内容达成协议的。
  tags: [无过失性辞退, 预告解除, 代通知金, 不能胜任工作]

- id: labor_contract_law_41
  law: 中华人民共和国劳动合同法
  article: 第四十一条
  content: 有下列情形之一，需要裁减人员二十人以上或者裁减不足二十人但占企业职工总数百分之十以上的，用人单位提前三十日向工会或者全体职工说明情况，听取工会或者职工的意见后，裁减人员方案经向劳动行政部门报告，可以裁减人员：（一）依照企业破产法规定进行重整的；（二）生产经营发生严重困难的；（三）企业转产、重大技术革新或者经营方式调整，经变更劳动合同后，仍需裁减人员的；（四）其他因劳动合同订立时所依据的客观经济情况发生重大变化，致使劳动合同无法履行的。
  tags: [经济性裁员, 裁员20人以上, 10%比例, 破产重整]

- id: labor_contract_law_42
  law: 中华人民共和国劳动合同法
  article: 第四十二条
  content: 劳动者有下列情形之一的，用人单位不得依照本法第四十条、第四十一条的规定解除劳动合同：（一）从事接触职业病危害作业的劳动者未进行离岗前职业健康检查，或者疑似职业病病人在诊断或者医学观察期间的；（二）在本单位患职业病或者因工负伤并被确认丧失或者部分丧失劳动能力的；（三）患病或者非因工负伤，在规定的医疗期内的；（四）女职工在孕期、产期、哺乳期的；（五）在本单位连续工作满十五年，且距法定退休年龄不足五年的；（六）法律、行政法规规定的其他情形。
  tags: [禁止解除, 职业病, 工伤, 医疗期, 三期女职工, 老职工保护]

- id: labor_contract_law_46
  law: 中华人民共和国劳动合同法
  article: 第四十六条
  content: 有下列情形之一的，用人单位应当向劳动者支付经济补偿：（一）劳动者依照本法第三十八条规定解除劳动合同的；（二）用人单位依照本法第三十六条规定向劳动者提出解除劳动合同并与劳动者协商一致解除劳动合同的；（三）用人单位依照本法第四十条规定解除劳动合同的；（四）用人单位依照本法第四十一条第一款规定解除劳动合同的；（五）除用人单位维持或者提高劳动合同约定条件续订劳动合同，劳动者不同意续订的情形外，依照本法第四十四条第一项规定终止固定期限劳动合同的；（六）依照本法第四十四条第四项、第五项规定终止劳动合同的；（七）法律、行政法规规定的其他情形。
  tags: [经济补偿, 支付情形, 解除合同, 终止合同]

- id: labor_contract_law_47
  law: 中华人民共和国劳动合同法
  article: 第四十七条
  content: 经济补偿按劳动者在本单位工作的年限，每满一年支付一个月工资的标准向劳动者支付。六个月以上不满一年的，按一年计算；不满六个月的，向劳动者支付半个月工资的经济补偿。劳动者月工资高于用人单位所在直辖市、设区的市级人民政府公布的本地区上年度职工月平均工资三倍的，向其支付经济补偿的标准按职工月平均工资三倍的数额支付，向其支付经济补偿的年限最高不超过十二年。本条所称月工资是指劳动者在劳动合同解除或者终止前十二个月的平均工资。
  tags: [经济补偿, N, 工作年限, 月平均工资, 三倍封顶, 十二年封顶]

- id: labor_contract_law_48
  law: 中华人民共和国劳动合同法
  article: 第四十八条
  content: 用人单位违反本法规定解除或者终止劳动合同，劳动者要求继续履行劳动合同的，用人单位应当继续履行；劳动者不要求继续履行劳动合同或者劳动合同已经不能继续履行的，用人单位应当依照本法第八十七条规定支付赔偿金。
  tags: [违法解除, 继续履行, 赔偿金]

- id: labor_contract_law_50
  law: 中华人民共和国劳动合同法
  article: 第五十条
  content: 用人单位应当在解除或者终止劳动合同时出具解除或者终止劳动合同的证明，并在十五日内为劳动者办理档案和社会保险关系转移手续。劳动者应当按照双方约定，办理工作交接。用人单位依照本法有关规定应当向劳动者支付经济补偿的，在办结工作交接时支付。用人单位对已经解除或者终止的劳动合同的文本，至少保存二年备查。
  tags: [离职证明, 档案转移, 社保转移, 工作交接]

- id: labor_contract_law_82
  law: 中华人民共和国劳动合同法
  article: 第八十二条
  content: 用人单位自用工之日起超过一个月不满一年未与劳动者订立书面劳动合同的，应当向劳动者每月支付二倍的工资。用人单位违反本法规定不与劳动者订立无固定期限劳动合同的，自应当订立无固定期限劳动合同之日起向劳动者每月支付二倍的工资。
  tags: [双倍工资, 未签合同, 无固定期限合同, 11个月上限]

- id: labor_contract_law_83
  law: 中华人民共和国劳动合同法
  article: 第八十三条
  content: 用人单位违反本法规定与劳动者约定试用期的，由劳动行政部门责令改正；违法约定的试用期已经履行的，由用人单位以劳动者试用期满月工资为标准，按已经履行的超过法定试用期的期间向劳动者支付赔偿金。
  tags: [试用期违法, 赔偿金, 超额试用期]

- id: labor_contract_law_85
  law: 中华人民共和国劳动合同法
  article: 第八十五条
  content: 用人单位有下列情形之一的，由劳动行政部门责令限期支付劳动报酬、加班费或者经济补偿；劳动报酬低于当地最低工资标准的，应当支付其差额部分；逾期不支付的，责令用人单位按应付金额百分之五十以上百分之一百以下的标准向劳动者加付赔偿金：（一）未按照劳动合同的约定或者国家规定及时足额支付劳动者劳动报酬的；（二）低于当地最低工资标准支付劳动者工资的；（三）安排加班不支付加班费的；（四）解除或者终止劳动合同，未依照本法规定给予劳动者经济补偿的。
  tags: [拖欠工资, 加班费, 赔偿金50%-100%, 劳动监察]

- id: labor_contract_law_87
  law: 中华人民共和国劳动合同法
  article: 第八十七条
  content: 用人单位违反本法规定解除或者终止劳动合同的，应当依照本法第四十七条规定的经济补偿标准的二倍向劳动者支付赔偿金。
  tags: [违法解除, 赔偿金, 2N, 双倍经济补偿]
