- id: social_insurance_law_4
  law: 中华人民共和国社会保险法
  article: 第四条
  content: 中华人民共和国境内的用人单位和个人依法缴纳社会保险费，有权查询缴费记录、个人权益记录，要求社会保险经办机构提供社会保险咨询等相关服务。个人依法享受社会保险待遇，有权监督本单位为其缴费情况。
  tags: [社会保险, 社保缴纳, 社保待遇, 缴费记录]
  applicable_scenarios: [未缴社保, 社保争议]

- id: social_insurance_law_10
  law: 中华人民共和国社会保险法
  article: 第十条
  content: 职工应当参加基本养老保险，由用人单位和职工共同缴纳基本养老保险费。无雇工的个体工商户、未在用人单位参加基本养老保险的非全日制从业人员以及其他灵活就业人员可以参加基本养老保险，由个人缴纳基本养老保险费。公务员和参照公务员法管理的工作人员养老保险的办法由国务院规定。
  tags: [养老保险, 基本养老保险, 社保缴纳]
  applicable_scenarios: [未缴养老保险, 社保争议]

- id: social_insurance_law_23
  law: 中华人民共和国社会保险法
  article: 第二十三条
  content: 职工应当参加职工基本医疗保险，由用人单位和职工按照国家规定共同缴纳基本医疗保险费。无雇工的个体工商户、未在用人单位参加职工基本医疗保险的非全日制从业人员以及其他灵活就业人员可以参加职工基本医疗保险，由个人按照国家规定缴纳基本医疗保险费。
  tags: [医疗保险, 基本医疗保险, 社保缴纳]
  applicable_scenarios: [未缴医疗保险, 医疗费用争议]

- id: social_insurance_law_33
  law: 中华人民共和国社会保险法
  article: 第三十三条
  content: 职工应当参加工伤保险，由用人单位缴纳工伤保险费，职工不缴纳工伤保险费。
  tags: [工伤保险, 工伤, 社保缴纳]
  applicable_scenarios: [工伤认定, 未缴工伤保险]

- id: social_insurance_law_44
  law: 中华人民共和国社会保险法
  article: 第四十四条
  content: 职工应当参加失业保险，由用人单位和职工按照国家规定共同缴纳失业保险费。
  tags: [失业保险, 社保缴纳]
  applicable_scenarios: [失业金争议]

- id: social_insurance_law_53
  law: 中华人民共和国社会保险法
  article: 第五十三条
  content: 职工应当参加生育保险，由用人单位按照国家规定缴纳生育保险费，职工不缴纳生育保险费。
  tags: [生育保险, 社保缴纳]
  applicable_scenarios: [生育津贴争议]

- id: social_insurance_law_58
  law: 中华人民共和国社会保险法
  article: 第五十八条
  content: 用人单位应当自用工之日起三十日内为其职工向社会保险经办机构申请办理社会保险登记。未办理社会保险登记的，由社会保险经办机构核定其应当缴纳的社会保险费。自愿参加社会保险的无雇工的个体工商户、未在用人单位参加社会保险的非全日制从业人员以及其他灵活就业人员，应当向社会保险经办机构申请办理社会保险登记。国家建立全国统一的个人社会保障号码。个人社会保障号码为公民身份号码。
  tags: [社保登记, 社保缴纳, 用工登记, 社会保障号码]
  applicable_scenarios: [未缴社保, 未办理社保登记]

- id: social_insurance_law_60
  law: 中华人民共和国社会保险法
  article: 第六十条
  content: 用人单位应当自行申报、按时足额缴纳社会保险费，非因不可抗力等法定事由不得缓缴、减免。职工应当缴纳的社会保险费由用人单位代扣代缴，用人单位应当按月将缴纳社会保险费的明细情况告知本人。无雇工的个体工商户、未在用人单位参加社会保险的非全日制从业人员以及其他灵活就业人员，可以直接向社会保险费征收机构缴纳社会保险费。
  tags: [社保缴纳, 代扣代缴, 申报]
  applicable_scenarios: [未缴社保, 少缴社保]

- id: social_insurance_law_63
  law: 中华人民共和国社会保险法
  article: 第六十三条
  content: 用人单位未按时足额缴纳社会保险费的，由社会保险费征收机构责令其限期缴纳或者补足。用人单位逾期仍未缴纳或者补足社会保险费的，社会保险费征收机构可以向银行和其他金融机构查询其存款账户；并可以申请县级以上有关行政部门作出划拨社会保险费的决定，书面通知其开户银行或者其他金融机构划拨社会保险费。用人单位账户余额少于应当缴纳的社会保险费的，社会保险费征收机构可以要求该用人单位提供担保，签订延期缴费协议。
  tags: [社保欠缴, 社保补缴, 强制征收, 滞纳金]
  applicable_scenarios: [未缴社保, 社保欠缴追缴]
