# 中华人民共和国社会保险法（2018年修正版）
# 2010年10月28日通过，2018年12月29日修正
# 共12章98条，自2011年7月1日起施行，2025-2026年沿用
# 来源：全国人大网 [WebSearch校验 2026-07-16]

- id: social_insurance_law_2
  law: 中华人民共和国社会保险法
  article: 第二条
  content: 国家建立基本养老保险、基本医疗保险、工伤保险、失业保险、生育保险等社会保险制度，保障公民在年老、疾病、工伤、失业、生育等情况下依法从国家和社会获得物质帮助的权利。
  tags: [社会保险, 五险, 养老保险, 医疗保险, 工伤保险, 失业保险, 生育保险]

- id: social_insurance_law_4
  law: 中华人民共和国社会保险法
  article: 第四条
  content: 中华人民共和国境内的用人单位和个人依法缴纳社会保险费，有权查询缴费记录、个人权益记录，要求社会保险经办机构提供社会保险咨询等相关服务。个人依法享受社会保险待遇，有权监督本单位为其缴费情况。
  tags: [社保缴纳, 社保待遇, 查询权, 监督权]

- id: social_insurance_law_10
  law: 中华人民共和国社会保险法
  article: 第十条
  content: 职工应当参加基本养老保险，由用人单位和职工共同缴纳基本养老保险费。无雇工的个体工商户、未在用人单位参加基本养老保险的非全日制从业人员以及其他灵活就业人员可以参加基本养老保险，由个人缴纳基本养老保险费。公务员和参照公务员法管理的工作人员养老保险的办法由国务院规定。
  tags: [养老保险, 用人单位缴费, 个人缴费, 灵活就业]

- id: social_insurance_law_16
  law: 中华人民共和国社会保险法
  article: 第十六条
  content: 参加基本养老保险的个人，达到法定退休年龄时累计缴费满十五年的，按月领取基本养老金。参加基本养老保险的个人，达到法定退休年龄时累计缴费不足十五年的，可以缴费至满十五年，按月领取基本养老金；也可以转入新型农村社会养老保险或者城镇居民社会养老保险，按照国务院规定享受相应的养老保险待遇。
  tags: [退休, 养老金, 缴费15年, 退休年龄]

- id: social_insurance_law_23
  law: 中华人民共和国社会保险法
  article: 第二十三条
  content: 职工应当参加职工基本医疗保险，由用人单位和职工按照国家规定共同缴纳基本医疗保险费。无雇工的个体工商户、未在用人单位参加职工基本医疗保险的非全日制从业人员以及其他灵活就业人员可以参加职工基本医疗保险，由个人按照国家规定缴纳基本医疗保险费。
  tags: [医疗保险, 用人单位缴费, 个人缴费, 灵活就业]

- id: social_insurance_law_33
  law: 中华人民共和国社会保险法
  article: 第三十三条
  content: 职工应当参加工伤保险，由用人单位缴纳工伤保险费，职工不缴纳工伤保险费。
  tags: [工伤保险, 用人单位缴费, 职工免费]

- id: social_insurance_law_36
  law: 中华人民共和国社会保险法
  article: 第三十六条
  content: 职工因工作原因受到事故伤害或者患职业病，且经工伤认定的，享受工伤保险待遇；其中，经劳动能力鉴定丧失劳动能力的，享受伤残待遇。工伤认定和劳动能力鉴定应当简捷、方便。
  tags: [工伤认定, 职业病, 伤残待遇, 劳动能力鉴定]

- id: social_insurance_law_37
  law: 中华人民共和国社会保险法
  article: 第三十七条
  content: 职工因下列情形之一导致本人在工作中伤亡的，不认定为工伤：（一）故意犯罪；（二）醉酒或者吸毒；（三）自残或者自杀；（四）法律、行政法规规定的其他情形。
  tags: [不认定工伤, 故意犯罪, 醉酒, 自残]

- id: social_insurance_law_38
  law: 中华人民共和国社会保险法
  article: 第三十八条
  content: 因工伤发生的下列费用，按照国家规定从工伤保险基金中支付：（一）治疗工伤的医疗费用和康复费用；（二）住院伙食补助费；（三）到统筹地区以外就医的交通食宿费；（四）安装配置伤残辅助器具所需费用；（五）生活不能自理的，经劳动能力鉴定委员会确认的生活护理费；（六）一次性伤残补助金和一至四级伤残职工按月领取的伤残津贴；（七）终止或者解除劳动合同时，应当享受的一次性医疗补助金；（八）因工死亡的，其遗属领取的丧葬补助金、供养亲属抚恤金和因工死亡补助金；（九）劳动能力鉴定费。
  tags: [工伤保险基金, 医疗费, 伤残补助金, 工亡补助金, 康复费]

- id: social_insurance_law_39
  law: 中华人民共和国社会保险法
  article: 第三十九条
  content: 因工伤发生的下列费用，按照国家规定由用人单位支付：（一）治疗工伤期间的工资福利；（二）五级、六级伤残职工按月领取的伤残津贴；（三）终止或者解除劳动合同时，应当享受的一次性伤残就业补助金。
  tags: [用人单位支付, 工伤期工资, 伤残津贴, 就业补助金]

- id: social_insurance_law_41
  law: 中华人民共和国社会保险法
  article: 第四十一条
  content: 职工所在用人单位未依法缴纳工伤保险费，发生工伤事故的，由用人单位支付工伤保险待遇。用人单位不支付的，从工伤保险基金中先行支付。从工伤保险基金中先行支付的工伤保险待遇应当由用人单位偿还。用人单位不偿还的，社会保险经办机构可以依照本法第六十三条的规定追偿。
  tags: [未缴工伤险, 用人单位支付, 先行支付, 追偿]

- id: social_insurance_law_45
  law: 中华人民共和国社会保险法
  article: 第四十五条
  content: 失业人员符合下列条件的，从失业保险基金中领取失业保险金：（一）失业前用人单位和本人已经缴纳失业保险费满一年的；（二）非因本人意愿中断就业的；（三）已经进行失业登记，并有求职要求的。
  tags: [失业保险, 缴费满一年, 非自愿失业, 失业登记]

- id: social_insurance_law_46
  law: 中华人民共和国社会保险法
  article: 第四十六条
  content: 失业人员失业前用人单位和本人累计缴费满一年不足五年的，领取失业保险金的期限最长为十二个月；累计缴费满五年不足十年的，领取失业保险金的期限最长为十八个月；累计缴费十年以上的，领取失业保险金的期限最长为二十四个月。重新就业后，再次失业的，缴费时间重新计算，领取失业保险金的期限与前次失业应当领取而尚未领取的失业保险金的期限合并计算，最长不超过二十四个月。
  tags: [失业保险金, 领取期限, 12月, 18月, 24月]

- id: social_insurance_law_54
  law: 中华人民共和国社会保险法
  article: 第五十四条
  content: 用人单位已经缴纳生育保险费的，其职工享受生育保险待遇；职工未就业配偶按照国家规定享受生育医疗费用待遇。所需资金从生育保险基金中支付。生育保险待遇包括生育医疗费用和生育津贴。
  tags: [生育保险, 生育医疗费, 生育津贴, 未就业配偶]

- id: social_insurance_law_58
  law: 中华人民共和国社会保险法
  article: 第五十八条
  content: 用人单位应当自用工之日起三十日内为其职工向社会保险经办机构申请办理社会保险登记。未办理社会保险登记的，由社会保险经办机构核定其应当缴纳的社会保险费。自愿参加社会保险的无雇工的个体工商户、未在用人单位参加社会保险的非全日制从业人员以及其他灵活就业人员，应当向社会保险经办机构申请办理社会保险登记。国家建立全国统一的个人社会保障号码。个人社会保障号码为公民身份号码。
  tags: [社保登记, 30日内, 用工登记, 身份证号]

- id: social_insurance_law_86
  law: 中华人民共和国社会保险法
  article: 第八十六条
  content: 用人单位未按时足额缴纳社会保险费的，由社会保险费征收机构责令限期缴纳或者补足，并自欠缴之日起，按日加收万分之五的滞纳金；逾期仍不缴纳的，由有关行政部门处欠缴数额一倍以上三倍以下的罚款。
  tags: [未缴社保, 滞纳金, 万分之五, 罚款1-3倍]

- id: social_insurance_law_88
  law: 中华人民共和国社会保险法
  article: 第八十八条
  content: 以欺诈、伪造证明材料或者其他手段骗取社会保险待遇的，由社会保险行政部门责令退回骗取的社会保险金，处骗取金额二倍以上五倍以下的罚款。
  tags: [骗取社保, 罚款2-5倍, 追回]
