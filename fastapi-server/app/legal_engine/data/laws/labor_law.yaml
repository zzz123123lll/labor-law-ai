- id: labor_law_50
  law: 中华人民共和国劳动法
  article: 第五十条
  content: 工资应当以货币形式按月支付给劳动者本人。不得克扣或者无故拖欠劳动者的工资。
  tags: [工资, 拖欠工资, 克扣工资, 支付]
  applicable_scenarios: [拖欠工资, 克扣工资]

- id: labor_law_44
  law: 中华人民共和国劳动法
  article: 第四十四条
  content: |
    有下列情形之一的，用人单位应当按照下列标准支付高于劳动者正常工作时间工资的工资报酬：
    （一）安排劳动者延长工作时间的，支付不低于工资的百分之一百五十的工资报酬；
    （二）休息日安排劳动者工作又不能安排补休的，支付不低于工资的百分之二百的工资报酬；
    （三）法定休假日安排劳动者工作的，支付不低于工资的百分之三百的工资报酬。
  tags: [加班, 加班费, 延长工作时间, 休息日, 法定节假日]
  applicable_scenarios: [不支付加班费, 强制加班]

- id: labor_law_36
  law: 中华人民共和国劳动法
  article: 第三十六条
  content: 国家实行劳动者每日工作时间不超过八小时、平均每周工作时间不超过四十四小时的工时制度。
  tags: [工作时间, 标准工时, 每日工作, 每周工作]
  applicable_scenarios: [超时加班, 工时争议]

- id: labor_law_41
  law: 中华人民共和国劳动法
  article: 第四十一条
  content: 用人单位由于生产经营需要，经与工会和劳动者协商后可以延长工作时间，一般每日不得超过一小时；因特殊原因需要延长工作时间的，在保障劳动者身体健康的条件下延长工作时间每日不得超过三小时，但是每月不得超过三十六小时。
  tags: [加班, 延长工作时间, 加班时限, 协商]
  applicable_scenarios: [强制加班, 超时加班]

- id: labor_law_72
  law: 中华人民共和国劳动法
  article: 第七十二条
  content: 社会保险基金按照保险类型确定资金来源，逐步实行社会统筹。用人单位和劳动者必须依法参加社会保险，缴纳社会保险费。
  tags: [社会保险, 社保缴纳, 强制参保]
  applicable_scenarios: [未缴社保, 社保争议]

- id: labor_law_82
  law: 中华人民共和国劳动法
  article: 第八十二条
  content: 提出仲裁要求的一方应当自劳动争议发生之日起六十日内向劳动争议仲裁委员会提出书面申请。仲裁裁决一般应在收到仲裁申请的六十日内作出。对仲裁裁决无异议的，当事人必须履行。
  tags: [劳动仲裁, 仲裁时效, 仲裁申请]
  applicable_scenarios: [劳动仲裁, 仲裁时效争议]

- id: labor_law_91
  law: 中华人民共和国劳动法
  article: 第九十一条
  content: 用人单位有下列侵害劳动者合法权益情形之一的，由劳动行政部门责令支付劳动者的工资报酬、经济补偿，并可以责令支付赔偿金：（一）克扣或者无故拖欠劳动者工资的；（二）拒不支付劳动者延长工作时间工资报酬的；（三）低于当地最低工资标准支付劳动者工资的；（四）解除劳动合同后，未依照本法规定给予劳动者经济补偿的。
  tags: [克扣工资, 拖欠工资, 加班费, 经济补偿, 赔偿金, 劳动监察]
  applicable_scenarios: [拖欠工资, 克扣工资, 不支付加班费, 低于最低工资, 不支付经济补偿]
