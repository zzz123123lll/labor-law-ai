# 中华人民共和国劳动法（2018年修正版）
# 1994年7月5日通过，2009年8月27日第一次修正，2018年12月29日第二次修正
# 共13章107条，现行有效
# 来源：全国人大网 / 人社部官网 [WebSearch校验 2026-07-16]

- id: labor_law_3
  law: 中华人民共和国劳动法
  article: 第三条
  content: 劳动者享有平等就业和选择职业的权利、取得劳动报酬的权利、休息休假的权利、获得劳动安全卫生保护的权利、接受职业技能培训的权利、享受社会保险和福利的权利、提请劳动争议处理的权利以及法律规定的其他劳动权利。
  tags: [劳动者权利, 平等就业, 劳动报酬, 休息休假, 社会保险]

- id: labor_law_15
  law: 中华人民共和国劳动法
  article: 第十五条
  content: 禁止用人单位招用未满十六周岁的未成年人。文艺、体育和特种工艺单位招用未满十六周岁的未成年人，必须遵守国家有关规定，并保障其接受义务教育的权利。
  tags: [童工, 未成年人保护, 禁止招用, 16周岁]

- id: labor_law_16
  law: 中华人民共和国劳动法
  article: 第十六条
  content: 劳动合同是劳动者与用人单位确立劳动关系、明确双方权利和义务的协议。建立劳动关系应当订立劳动合同。
  tags: [劳动合同, 劳动关系, 书面合同]

- id: labor_law_36
  law: 中华人民共和国劳动法
  article: 第三十六条
  content: 国家实行劳动者每日工作时间不超过八小时、平均每周工作时间不超过四十四小时的工时制度。
  tags: [工作时间, 标准工时, 8小时工作制, 每周44小时]

- id: labor_law_38
  law: 中华人民共和国劳动法
  article: 第三十八条
  content: 用人单位应当保证劳动者每周至少休息一日。
  tags: [休息日, 每周休息]

- id: labor_law_41
  law: 中华人民共和国劳动法
  article: 第四十一条
  content: 用人单位由于生产经营需要，经与工会和劳动者协商后可以延长工作时间，一般每日不得超过一小时；因特殊原因需要延长工作时间的，在保障劳动者身体健康的条件下延长工作时间每日不得超过三小时，但是每月不得超过三十六小时。
  tags: [加班, 延长工作时间, 加班限制, 每月36小时]

- id: labor_law_44
  law: 中华人民共和国劳动法
  article: 第四十四条
  content: 有下列情形之一的，用人单位应当按照下列标准支付高于劳动者正常工作时间工资的工资报酬：（一）安排劳动者延长工作时间的，支付不低于工资的百分之一百五十的工资报酬；（二）休息日安排劳动者工作又不能安排补休的，支付不低于工资的百分之二百的工资报酬；（三）法定休假日安排劳动者工作的，支付不低于工资的百分之三百的工资报酬。
  tags: [加班费, 150%, 200%, 300%, 工作日加班, 休息日加班, 法定节假日加班]

- id: labor_law_45
  law: 中华人民共和国劳动法
  article: 第四十五条
  content: 国家实行带薪年休假制度。劳动者连续工作一年以上的，享受带薪年休假。具体办法由国务院规定。
  tags: [年休假, 带薪年假, 连续工作满一年]

- id: labor_law_46
  law: 中华人民共和国劳动法
  article: 第四十六条
  content: 工资分配应当遵循按劳分配原则，实行同工同酬。工资水平在经济发展的基础上逐步提高。国家对工资总量实行宏观调控。
  tags: [工资, 按劳分配, 同工同酬]

- id: labor_law_48
  law: 中华人民共和国劳动法
  article: 第四十八条
  content: 国家实行最低工资保障制度。最低工资的具体标准由省、自治区、直辖市人民政府规定，报国务院备案。用人单位支付劳动者的工资不得低于当地最低工资标准。
  tags: [最低工资, 工资保障, 地方标准]

- id: labor_law_50
  law: 中华人民共和国劳动法
  article: 第五十条
  content: 工资应当以货币形式按月支付给劳动者本人。不得克扣或者无故拖欠劳动者的工资。
  tags: [工资支付, 按月支付, 拖欠工资, 克扣工资]

- id: labor_law_51
  law: 中华人民共和国劳动法
  article: 第五十一条
  content: 劳动者在法定休假日和婚丧假期间以及依法参加社会活动期间，用人单位应当依法支付工资。
  tags: [法定假日工资, 婚丧假, 带薪休假]

- id: labor_law_62
  law: 中华人民共和国劳动法
  article: 第六十二条
  content: 女职工生育享受不少于九十天的产假。
  tags: [产假, 女职工保护, 生育待遇, 90天]

- id: labor_law_72
  law: 中华人民共和国劳动法
  article: 第七十二条
  content: 社会保险基金按照保险类型确定资金来源，逐步实行社会统筹。用人单位和劳动者必须依法参加社会保险，缴纳社会保险费。
  tags: [社会保险, 社保缴纳, 强制参保, 社会统筹]

- id: labor_law_77
  law: 中华人民共和国劳动法
  article: 第七十七条
  content: 用人单位与劳动者发生劳动争议，当事人可以依法申请调解、仲裁、提起诉讼，也可以协商解决。调解原则适用于仲裁和诉讼程序。
  tags: [劳动争议, 调解, 仲裁, 诉讼, 协商]

- id: labor_law_79
  law: 中华人民共和国劳动法
  article: 第七十九条
  content: 劳动争议发生后，当事人可以向本单位劳动争议调解委员会申请调解；调解不成，当事人一方要求仲裁的，可以向劳动争议仲裁委员会申请仲裁。当事人一方也可以直接向劳动争议仲裁委员会申请仲裁。对仲裁裁决不服的，可以向人民法院提起诉讼。
  tags: [劳动争议处理, 调解, 仲裁前置, 诉讼]

- id: labor_law_91
  law: 中华人民共和国劳动法
  article: 第九十一条
  content: 用人单位有下列侵害劳动者合法权益情形之一的，由劳动行政部门责令支付劳动者的工资报酬、经济补偿，并可以责令支付赔偿金：（一）克扣或者无故拖欠劳动者工资的；（二）拒不支付劳动者延长工作时间工资报酬的；（三）低于当地最低工资标准支付劳动者工资的；（四）解除劳动合同后，未依照本法规定给予劳动者经济补偿的。
  tags: [违法责任, 克扣工资, 拖欠工资, 加班费, 经济补偿, 赔偿金]
