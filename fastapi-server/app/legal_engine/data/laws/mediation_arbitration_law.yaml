# 中华人民共和国劳动争议调解仲裁法
# 2007年12月29日通过，2008年5月1日起施行
# 共4章54条，截至2025年未修订
# 来源：全国人大网 [WebSearch校验 2026-07-16]

- id: mediation_arbitration_law_2
  law: 中华人民共和国劳动争议调解仲裁法
  article: 第二条
  content: 中华人民共和国境内的用人单位与劳动者发生的下列劳动争议，适用本法：（一）因确认劳动关系发生的争议；（二）因订立、履行、变更、解除和终止劳动合同发生的争议；（三）因除名、辞退和辞职、离职发生的争议；（四）因工作时间、休息休假、社会保险、福利、培训以及劳动保护发生的争议；（五）因劳动报酬、工伤医疗费、经济补偿或者赔偿金等发生的争议；（六）法律、法规规定的其他劳动争议。
  tags: [劳动争议, 适用范围, 劳动关系, 解除合同, 劳动报酬, 工伤]

- id: mediation_arbitration_law_3
  law: 中华人民共和国劳动争议调解仲裁法
  article: 第三条
  content: 解决劳动争议，应当根据事实，遵循合法、公正、及时、着重调解的原则，依法保护当事人的合法权益。
  tags: [争议解决原则, 着重调解, 合法公正及时]

- id: mediation_arbitration_law_5
  law: 中华人民共和国劳动争议调解仲裁法
  article: 第五条
  content: 发生劳动争议，当事人不愿协商、协商不成或者达成和解协议后不履行的，可以向调解组织申请调解；不愿调解、调解不成或者达成调解协议后不履行的，可以向劳动争议仲裁委员会申请仲裁；对仲裁裁决不服的，除本法另有规定的外，可以向人民法院提起诉讼。
  tags: [劳动争议处理程序, 协商, 调解, 仲裁前置, 诉讼]

- id: mediation_arbitration_law_6
  law: 中华人民共和国劳动争议调解仲裁法
  article: 第六条
  content: 发生劳动争议，当事人对自己提出的主张，有责任提供证据。与争议事项有关的证据属于用人单位掌握管理的，用人单位应当提供；用人单位不提供的，应当承担不利后果。
  tags: [举证责任, 谁主张谁举证, 用人单位举证义务]

- id: mediation_arbitration_law_14
  law: 中华人民共和国劳动争议调解仲裁法
  article: 第十四条
  content: 经调解达成协议的，应当制作调解协议书。调解协议书由双方当事人签名或者盖章，经调解员签名并加盖调解组织印章后生效，对双方当事人具有约束力，当事人应当履行。自劳动争议调解组织收到调解申请之日起十五日内未达成调解协议的，当事人可以依法申请仲裁。
  tags: [调解协议, 调解书, 15日, 调解期限]

- id: mediation_arbitration_law_16
  law: 中华人民共和国劳动争议调解仲裁法
  article: 第十六条
  content: 因支付拖欠劳动报酬、工伤医疗费、经济补偿或者赔偿金事项达成调解协议，用人单位在协议约定期限内不履行的，劳动者可以持调解协议书依法向人民法院申请支付令。人民法院应当依法发出支付令。
  tags: [支付令, 拖欠工资, 调解协议, 强制执行]

- id: mediation_arbitration_law_21
  law: 中华人民共和国劳动争议调解仲裁法
  article: 第二十一条
  content: 劳动争议仲裁委员会负责管辖本区域内发生的劳动争议。劳动争议由劳动合同履行地或者用人单位所在地的劳动争议仲裁委员会管辖。双方当事人分别向劳动合同履行地和用人单位所在地的劳动争议仲裁委员会申请仲裁的，由劳动合同履行地的劳动争议仲裁委员会管辖。
  tags: [仲裁管辖, 合同履行地, 用人单位所在地]

- id: mediation_arbitration_law_22
  law: 中华人民共和国劳动争议调解仲裁法
  article: 第二十二条
  content: 发生劳动争议的劳动者和用人单位为劳动争议仲裁案件的双方当事人。劳务派遣单位或者用工单位与劳动者发生劳动争议的，劳务派遣单位和用工单位为共同当事人。
  tags: [仲裁当事人, 劳务派遣, 共同当事人]

- id: mediation_arbitration_law_27
  law: 中华人民共和国劳动争议调解仲裁法
  article: 第二十七条
  content: 劳动争议申请仲裁的时效期间为一年。仲裁时效期间从当事人知道或者应当知道其权利被侵害之日起计算。前款规定的仲裁时效，因当事人一方向对方当事人主张权利，或者向有关部门请求权利救济，或者对方当事人同意履行义务而中断。从中断时起，仲裁时效期间重新计算。因不可抗力或者其他正当理由，当事人不能在本条第一款规定的仲裁时效期间申请仲裁的，仲裁时效中止。从中止时效的原因消除之日起，仲裁时效期间继续计算。劳动关系存续期间因拖欠劳动报酬发生争议的，劳动者申请仲裁不受本条第一款规定的仲裁时效期间的限制；但是，劳动关系终止的，应当自劳动关系终止之日起一年内提出。
  tags: [仲裁时效, 一年, 中断, 中止, 拖欠工资不受时效限制]

- id: mediation_arbitration_law_29
  law: 中华人民共和国劳动争议调解仲裁法
  article: 第二十九条
  content: 劳动争议仲裁委员会收到仲裁申请之日起五日内，认为符合受理条件的，应当受理，并通知申请人；认为不符合受理条件的，应当书面通知申请人不予受理，并说明理由。对劳动争议仲裁委员会不予受理或者逾期未作出决定的，申请人可以就该劳动争议事项向人民法院提起诉讼。
  tags: [仲裁受理, 5日内决定, 不予受理, 向法院起诉]

- id: mediation_arbitration_law_43
  law: 中华人民共和国劳动争议调解仲裁法
  article: 第四十三条
  content: 仲裁庭裁决劳动争议案件，应当自劳动争议仲裁委员会受理仲裁申请之日起四十五日内结束。案情复杂需要延期的，经劳动争议仲裁委员会主任批准，可以延期并书面通知当事人，但是延长期限不得超过十五日。逾期未作出仲裁裁决的，当事人可以就该劳动争议事项向人民法院提起诉讼。仲裁庭裁决劳动争议案件时，其中一部分事实已经清楚，可以就该部分先行裁决。
  tags: [仲裁审理期限, 45日, 最长60日, 先行裁决]

- id: mediation_arbitration_law_44
  law: 中华人民共和国劳动争议调解仲裁法
  article: 第四十四条
  content: 仲裁庭对追索劳动报酬、工伤医疗费、经济补偿或者赔偿金的案件，根据当事人的申请，可以裁决先予执行，移送人民法院执行。仲裁庭裁决先予执行的，应当符合下列条件：（一）当事人之间权利义务关系明确；（二）不先予执行将严重影响申请人的生活。劳动者申请先予执行的，可以不提供担保。
  tags: [先予执行, 劳动报酬, 工伤医疗费, 无需担保]

- id: mediation_arbitration_law_47
  law: 中华人民共和国劳动争议调解仲裁法
  article: 第四十七条
  content: 下列劳动争议，除本法另有规定的外，仲裁裁决为终局裁决，裁决书自作出之日起发生法律效力：（一）追索劳动报酬、工伤医疗费、经济补偿或者赔偿金，不超过当地月最低工资标准十二个月金额的争议；（二）因执行国家的劳动标准在工作时间、休息休假、社会保险等方面发生的争议。
  tags: [一裁终局, 小额争议, 劳动标准, 终局裁决]

- id: mediation_arbitration_law_48
  law: 中华人民共和国劳动争议调解仲裁法
  article: 第四十八条
  content: 劳动者对本法第四十七条规定的仲裁裁决不服的，可以自收到仲裁裁决书之日起十五日内向人民法院提起诉讼。
  tags: [劳动者起诉权, 15日内, 不服终局裁决]

- id: mediation_arbitration_law_49
  law: 中华人民共和国劳动争议调解仲裁法
  article: 第四十九条
  content: 用人单位有证据证明本法第四十七条规定的仲裁裁决有下列情形之一，可以自收到仲裁裁决书之日起三十日内向劳动争议仲裁委员会所在地的中级人民法院申请撤销裁决：（一）适用法律、法规确有错误的；（二）劳动争议仲裁委员会无管辖权的；（三）违反法定程序的；（四）裁决所根据的证据是伪造的；（五）对方当事人隐瞒了足以影响公正裁决的证据的；（六）仲裁员在仲裁该案时有索贿受贿、徇私舞弊、枉法裁决行为的。人民法院经组成合议庭审查核实裁决有前款规定情形之一的，应当裁定撤销。仲裁裁决被人民法院裁定撤销的，当事人可以自收到裁定书之日起十五日内就该劳动争议事项向人民法院提起诉讼。
  tags: [用人单位撤销权, 30日申请, 中级人民法院, 六种情形]

- id: mediation_arbitration_law_50
  law: 中华人民共和国劳动争议调解仲裁法
  article: 第五十条
  content: 当事人对本法第四十七条规定以外的其他劳动争议案件的仲裁裁决不服的，可以自收到仲裁裁决书之日起十五日内向人民法院提起诉讼；期满不起诉的，裁决书发生法律效力。
  tags: [非终局裁决救济, 15日, 向人民法院起诉]

- id: mediation_arbitration_law_51
  law: 中华人民共和国劳动争议调解仲裁法
  article: 第五十一条
  content: 当事人对发生法律效力的调解书、裁决书，应当依照规定的期限履行。一方当事人逾期不履行的，另一方当事人可以依照民事诉讼法的有关规定向人民法院申请执行。受理申请的人民法院应当依法执行。
  tags: [生效文书执行, 调解书, 裁决书, 申请法院执行]

- id: mediation_arbitration_law_53
  law: 中华人民共和国劳动争议调解仲裁法
  article: 第五十三条
  content: 劳动争议仲裁不收费。劳动争议仲裁委员会的经费由财政予以保障。
  tags: [仲裁免费, 不收费, 财政保障]
