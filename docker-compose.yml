services:
  nginx:
    image: nginx:alpine
    ports: ["80:80", "443:443"]
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on: [backend, web, admin]

  backend:
    build: ./fastapi-server
    env_file: ./fastapi-server/.env
    depends_on: [postgres, redis]
    volumes:
      - ./fastapi-server/app/legal_engine/data:/app/app/legal_engine/data:ro

  web:
    build:
      context: ./web-app
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: https://your-domain.com

  admin:
    build:
      context: ./admin-panel
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: https://your-domain.com

  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: laborlaw
      POSTGRES_USER: laborlaw
      POSTGRES_PASSWORD: ${DB_PASSWORD:-laborlaw}
    volumes: [pgdata:/var/lib/postgresql/data]

  redis:
    image: redis:7-alpine

volumes:
  pgdata:
